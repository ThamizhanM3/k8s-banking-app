apiVersion: v1
kind: Service
metadata: 
  name: {{ .Chart.Name }}-fraud-detection
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Chart.Name }}-fraud-detection
  ports:
    - port: {{ .Values.fraud.port }}
      targetPort: {{ .Values.fraud.port }}
  type: {{ .Values.fraud.service.type }}