apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Chart.Name }}-fraud-vpa-canary
  namespace: {{ .Values.namespace }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Chart.Name }}-fraud-deployment-canary
  updatePolicy:
    updateMode: {{ .Values.fraud.canary.vpa.updateMode }}