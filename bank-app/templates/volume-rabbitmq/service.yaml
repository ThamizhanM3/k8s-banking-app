apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-rabbitmq-service
  namespace: {{ .Values.namespace }}
spec:
  clusterIP: {{ .Values.rabbitmq.clusterIP }}
  selector:
    app: {{ .Chart.Name }}-rabbitmq
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

  - name: management
    port: 15672
    targetPort: 15672