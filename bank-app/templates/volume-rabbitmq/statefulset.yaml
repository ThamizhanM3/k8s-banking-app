apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-rabbitmq
  namespace: {{ .Values.namespace }}
spec:
  serviceName: {{ .Chart.Name }}-rabbitmq-service
  replicas: {{ .Values.rabbitmq.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-rabbitmq
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-rabbitmq
    spec:
      containers:
      - name: {{ .Chart.Name }}-rabbitmq-container
        image: {{ .Values.rabbitmq.image }}
        resources:
          requests:
            memory: {{ .Values.rabbitmq.resources.requests.memory }}
            cpu: {{ .Values.rabbitmq.resources.requests.cpu }}
          limits:
            memory: {{ .Values.rabbitmq.resources.limits.memory }}
            cpu: {{ .Values.rabbitmq.resources.limits.cpu }}

        ports:
        - containerPort: 5672   # AMQP
        - containerPort: 15672  # UI

        volumeMounts:
        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq
        startupProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 240
          failureThreshold: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 6
          timeoutSeconds: 5

  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-storage
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: nfs-client
      resources:
        requests:
          storage: 1Gi