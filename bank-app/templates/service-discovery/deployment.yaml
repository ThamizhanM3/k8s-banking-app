apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-service-deployment
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.service.replicas }}
  selector:
    matchLabels:
      app: {{  .Chart.Name }}-service
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-service
    spec:
      containers:
        - name: {{ .Chart.Name }}-service-container
          image: {{ .Values.service.image.repository }}:{{ .Values.service.image.tag }}
          resources:
            requests:
              memory: {{ .Values.service.resources.requests.memory }}
              cpu: {{ .Values.service.resources.requests.cpu }}
            limits:
              memory: {{ .Values.service.resources.limits.memory }}
              cpu: {{ .Values.service.resources.limits.cpu }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-service-config
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3