apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-account-secret
  namespace: {{ .Values.namespace }}
stringData:
  DB_HOST: {{ .Values.account.env.dbHost }}
  DB_USER: {{ .Values.account.env.dbUser }}
  DB_PASS: {{ .Values.account.env.dbPass }}
  DB_NAME: {{ .Values.account.env.dbName }}
  REDIS_HOST: {{ .Values.account.env.redisHost }}