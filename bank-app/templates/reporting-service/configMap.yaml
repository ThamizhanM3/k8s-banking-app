apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-reporting-config
  namespace: {{ .Values.namespace }}
data:
  DB_HOST: "{{ .Values.reporting.env.dbHost }}"
  DB_USER: "{{ .Values.reporting.env.dbUser }}"
  DB_NAME: "{{ .Values.reporting.env.dbName }}"
  PORT: "{{ .Values.reporting.port }}"