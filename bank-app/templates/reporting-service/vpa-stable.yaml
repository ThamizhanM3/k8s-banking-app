apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Chart.Name }}-reporting-vpa-stable
  namespace: {{ .Values.namespace }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Chart.Name }}-reporting-deployment-stable
  updatePolicy:
    updateMode: {{ .Values.reporting.stable.vpa.updateMode }}