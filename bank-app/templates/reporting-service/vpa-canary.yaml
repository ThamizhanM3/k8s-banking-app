apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Chart.Name }}-reporting-vpa-canary
  namespace: {{ .Values.namespace }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Chart.Name }}-reporting-deployment-canary
  updatePolicy:
    updateMode: "{{ .Values.reporting.canary.vpa.updateMode }}"