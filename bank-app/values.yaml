      maxReplicas: 3
      resource:
        cpu:
          UtilizationPercentage: 70
  port: "80"
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
  service:
    type: NodePort
  env:
    userUrl: "/api/user"
    accountUrl: "/api/account"
    txUrl: "/api/tx"
    loanUrl: "/api/loan"
    reportUrl: "/api/report"

