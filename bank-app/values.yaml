namespace: banking-app

account:
  stable:
    version: "stable"
    image:
      repository: "yaswanthreddy1602/account-service"
      tag: "v1"
    replicas: 2
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      resource:
        cpu:
          UtilizationPercentage: 70
  canary:
    version: "canary"
    image:
      repository: "yaswanthreddy1602/account-service"
      tag: "v1"
    replicas: 1
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      resource:
        cpu:
          UtilizationPercentage: 70
  port: "3002"
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
  env:
    dbHost: "mysql"
    dbUser: "root"
    dbPass: "rootpassword"
    dbName: "banking_db"
    redisHost: "redis"
  service:
    type: NodePort

config:
  image:
    repository: "yaswanthreddy1602/config-service"
