namespace: banking-app

account:
  image: 
    repository: "yaswanthreddy1602/account-service"
    tag: "v1"
  replicas: 2
  port: "3002"
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
  env:
    dbHost: "mysql"
    dbUser: "root"
    dbPass: "rootpassword"
    dbName: "banking_db"
    redisHost: "redis"
  service:
    type: NodePort
