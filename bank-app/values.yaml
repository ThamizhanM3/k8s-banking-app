      memory: "256Mi"
  service:
    type: NodePort
  env:
    mqUrl: "amqp://rabbitmq"

frontend:
  stable:
    version: "stable"
    image:
      repository: "thamizhanm3/bank-frontend"
      tag: "v1"
    replicas: 2
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      resource:
